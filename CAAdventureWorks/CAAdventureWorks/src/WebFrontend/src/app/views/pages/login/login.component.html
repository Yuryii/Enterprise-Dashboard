<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="10" xl="8">
        <c-card-group>
          <c-card class="p-4">
            <c-card-body class="text-center">
              <div>
                <h1 class="mb-4 fs-2 text-nowrap">AdventureWorks</h1>
                <p class="text-body-secondary mb-4">
                  Đăng nhập bằng tài khoản công ty để truy cập cổng hệ thống
                </p>
                <button cButton class="px-4 mb-3" color="primary" size="lg" (click)="login()">
                  <svg cIcon class="me-2" name="cilShieldAlt"></svg>
                  Đăng nhập ngay
                </button>
                <div class="mt-3 text-body-secondary small">
                  <p>Sử dụng thông tin đăng nhập doanh nghiệp của bạn để xác thực.</p>
                </div>
              </div>
            </c-card-body>
          </c-card>
          <c-card [style.minWidth.%]="44" class="text-white bg-primary py-5">
            <c-card-body class="text-center d-flex flex-column justify-content-center align-items-center">
              <div>
                <h2>AdventureWorks</h2>
                <p class="mt-2">
                  Cổng hoạch định nguồn lực doanh nghiệp
                </p>
                <p class="small">
                  Vận hành bởi hệ thống quản lý định danh Keycloak
                </p>
              </div>
            </c-card-body>
          </c-card>
        </c-card-group>
      </c-col>
    </c-row>
  </c-container>
</div>
