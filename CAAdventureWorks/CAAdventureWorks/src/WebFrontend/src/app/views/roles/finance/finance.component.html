<c-row>
  <c-col xs>
    <c-card class="mb-4">
      <c-card-header>
        <strong>{{ title }}</strong>
        <span class="float-end text-body-secondary fs-6">{{ subtitle }}</span>
      </c-card-header>
      <c-card-body>
        <div class="text-center py-5">
          <svg cIcon class="icon icon-xl text-success mb-3" name="cil-dollar"></svg>
          <h3>{{ title }}</h3>
          <p class="text-body-secondary">Finance Dashboard - Financial reporting and budgets</p>
        </div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
